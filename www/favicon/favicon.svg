<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4d7dff"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#b355f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="15%" r="75%">
      <stop offset="0%" stop-color="#2a2f6b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#0d0f16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- base tile -->
  <rect width="512" height="512" rx="112" fill="#0b0d14"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#8b5cf6" stroke-opacity="0.35" stroke-width="8"/>

  <!-- monogram -->
  <text x="256" y="316" font-family="Poppins, sans-serif" font-weight="700"
        font-size="230" text-anchor="middle" fill="url(#grad)" letter-spacing="-8">AE</text>

  <!-- accent underline, echoing the site's gradient rule -->
  <rect x="146" y="356" width="220" height="14" rx="7" fill="url(#grad)" opacity="0.9"/>
</svg>
